name: Bug report
description: Report a problem with the TikTok Studio automation
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: 2.3.0
    validations:
      required: true
  - type: input
    id: tiktok_language
    attributes:
      label: TikTok interface language
      placeholder: English, Italian, etc.
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console logs
      description: Do not include credentials, cookies, tokens, or private account information.
      render: shell
