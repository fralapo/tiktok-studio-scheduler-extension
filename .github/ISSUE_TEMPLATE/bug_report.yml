name: Segnalazione bug
description: Segnala un problema nell'automazione TikTok Studio
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Versione estensione
      placeholder: 2.2.2
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Comportamento osservato
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento atteso
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Log console
      description: Non includere credenziali, cookie o token.
      render: shell
