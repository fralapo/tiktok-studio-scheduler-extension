name: Validate extension

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest JSON
        run: python -m json.tool manifest.json > /dev/null
      - name: Check required files
        run: |
          test -f manifest.json
          test -f content.js
          test -f popup.html
          test -f popup.js
          test -f popup.css
          test -f icons/icon16.png
          test -f icons/icon32.png
          test -f icons/icon48.png
          test -f icons/icon128.png
      - name: Check version consistency
        run: |
          python - <<'PY'
          import json, pathlib, sys
          manifest = json.loads(pathlib.Path('manifest.json').read_text())
          version = manifest['version']
          texts = {
              'content.js': pathlib.Path('content.js').read_text(),
              'popup.js': pathlib.Path('popup.js').read_text(),
              'popup.html': pathlib.Path('popup.html').read_text(),
          }
          missing = [name for name, text in texts.items() if version not in text]
          if missing:
              print(f"Version {version} not found in: {', '.join(missing)}")
              sys.exit(1)
          print(f"Version is consistent: {version}")
          PY
      - name: Check optional caption behavior
        run: |
          python - <<'PY'
          from pathlib import Path
          html = Path('popup.html').read_text()
          popup = Path('popup.js').read_text()
          content = Path('content.js').read_text()
          assert 'id="caption"' in html
          caption_tag = html.split('id="caption"', 1)[1].split('>', 1)[0]
          assert 'required' not in caption_tag
          assert "Enter a caption." not in popup
          assert "if(config.caption)" in content or "if (config.caption)" in content
          assert "typeof c.caption!=='string'" in content or "typeof config.caption !== 'string'" in content
          print('Optional caption behavior is present.')
          PY
